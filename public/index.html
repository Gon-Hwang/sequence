<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sequence Online</title>
    <link rel="stylesheet" href="/styles.css?v=20" />
  </head>
  <body>
    <div id="resultBanner" class="result-banner" hidden>
      <div class="result-banner__inner">
        <p id="resultBannerText" class="result-banner__text"></p>
        <button id="resultBannerClose" type="button" class="result-banner__close">
          닫기
        </button>
      </div>
    </div>
    <main class="container">
      <h1>Sequence Online</h1>

      <section id="lobbyControls" class="card">
        <div class="grid">
          <input id="nameInput" maxlength="20" placeholder="닉네임" />
          <select id="humanCountInput">
            <option value="0">사람 0명</option>
            <option value="1" selected>사람 1명</option>
            <option value="2">사람 2명</option>
            <option value="3">사람 3명</option>
          </select>
          <select id="aiCountInput">
            <option value="0">AI 0명</option>
            <option value="1">AI 1명</option>
            <option value="2" selected>AI 2명</option>
            <option value="3">AI 3명</option>
          </select>
          <div class="small">인원 합 2~3명: 사람 + AI = 2 또는 3 (방장은 관전이라 사람 N은 ‘참가자’ 기준)</div>
          <details class="rule-details small">
            <summary>시퀀스 규칙 (공식과 동일)</summary>
            <p>
              <strong>중복 사용 가능:</strong> 첫 번째 시퀀스(칩 5개)를 구성하는 칩 중 1개를 두 번째 시퀀스의
              일부로 재사용할 수 있습니다.
            </p>
            <p>
              <strong>9개 칩으로 2개 완성:</strong> 9개의 칩을 일렬로 놓으면, 앞쪽 5개(시퀀스 1)와 뒤쪽
              5개(시퀀스 2)가 중간 칩 1개를 공유하며 2개의 시퀀스로 인정됩니다.
            </p>
          </details>
        </div>
        <div class="row">
          <button id="createBtn">방 만들기</button>
          <input id="roomCodeInput" maxlength="6" placeholder="방 코드" />
          <button id="joinBtn">방 참가</button>
        </div>
      </section>

      <section class="card row-between">
        <div>
          <div>방 코드: <strong id="roomCode">-</strong></div>
          <div>상태: <span id="status">대기</span></div>
          <p id="lobbyHint" class="small"></p>
        </div>
        <div class="lobby-actions">
          <button id="startBtn" disabled>게임 시작</button>
          <div id="postGameBar" class="post-game-actions" hidden>
            <button id="rematchBtn" type="button">게임 다시하기</button>
            <button id="backToLobbyBtn" type="button">로비로 나가기</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h3>플레이어</h3>
        <div id="players" class="players"></div>
        <p id="spectators" class="small"></p>
      </section>

      <section class="card">
        <h3>내 손패</h3>
        <div id="hand" class="hand"></div>
        <p id="selectedCardInfo" class="small"></p>
      </section>

      <section class="card">
        <h3>보드</h3>
        <div id="board" class="board"></div>
      </section>

      <section class="card">
        <h3>로그</h3>
        <div id="log" class="log"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/main.js?v=20"></script>
  </body>
</html>
